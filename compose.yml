services:
  postgres:
    image: postgres:16-alpine
    container_name: chill-code-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chill_code
      POSTGRES_PASSWORD: chill_code
      POSTGRES_DB: chill_code
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chill_code -d chill_code"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: